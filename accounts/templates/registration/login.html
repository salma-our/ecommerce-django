{% extends 'layout.html' %}

{% block title %}

{% block content %}

<div class="row justify-content-center mt-5">

    <div class="col-md-5">

        <h2>Connexion</h2>

            {% csrf_token %}

                Se connecter

        </form>

    </div>

</div>

{% endblock %}
