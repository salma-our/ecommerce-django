{% extends 'layout.html' %}

{% block title %}
Créer un compte
{% endblock %}

{% block content %}

<div class="row justify-content-center mt-5">

    <div class="col-md-6">

        <h2>Création d'un compte</h2>

        <form method="post">

            {% csrf_token %}

            {{ form.as_p }}

            <button type="submit" class="btn btn-success">
                Créer mon compte
            </button>

        </form>

    </div>

</div>

{% endblock %}
