<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">

    <title>
        {% block title %}
        E-commerce
        {% endblock %}
    </title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>
        body {
            background-color: #f5f7fa;
            font-family: Arial, sans-serif;
            color: #1f2937;
        }

        main.container {
            padding-top: 45px;
            padding-bottom: 50px;
        }

        .navbar {
            padding: 18px 0;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.12);
        }

        .navbar-brand {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .nav-link {
            font-size: 17px;
            margin-left: 18px;
            transition: 0.3s;
        }

        .nav-link:hover {
            color: #ffffff !important;
        }

        .hero-section {
            background: linear-gradient(135deg, #111827, #1f2937);
            color: white;
            padding: 70px 0;
            margin-bottom: 20px;
        }

        .hero-section h1 {
            font-size: 48px;
            font-weight: 800;
            margin-bottom: 15px;
        }

        .hero-section p {
            font-size: 20px;
            color: #d1d5db;
            max-width: 700px;
        }

        .page-title {
            font-size: 42px;
            font-weight: 800;
            margin-bottom: 35px;
        }

        .product-card {
            border: none;
            border-radius: 18px;
            overflow: hidden;
            transition: all 0.3s ease;
            background-color: white;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.08);
        }

        .product-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 18px 35px rgba(0, 0, 0, 0.14);
        }

        .product-img {
            height: 230px;
            width: 100%;
            object-fit: contain;
            background-color: #f8f9fa;
            padding: 15px;
        }

        .product-title {
            font-size: 22px;
            font-weight: 700;
            min-height: 55px;
        }

        .product-description {
            color: #555;
            font-size: 16px;
            min-height: 70px;
        }

        .price {
            font-size: 22px;
            font-weight: 800;
            color: #0d6efd;
        }

        .btn-details {
            border-radius: 30px;
            padding: 10px 24px;
            font-weight: 600;
        }

        .detail-img {
            width: 100%;
            height: 100%;
            min-height: 420px;
            object-fit: contain;
            background-color: #f8f9fa;
            padding: 25px;
        }

        .detail-title {
            font-size: 36px;
            font-weight: 800;
        }

        .detail-description {
            font-size: 18px;
            color: #555;
            line-height: 1.7;
        }

        .footer {
            margin-top: 70px;
            padding: 25px 0;
            background-color: #111827;
            color: #d1d5db;
            text-align: center;
        }

        .badge-category {
            font-size: 14px;
            padding: 8px 14px;
            border-radius: 20px;
        }
    </style>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">

        <a class="navbar-brand" href="/products/">
            E-commerce
        </a>

        <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav"
                aria-controls="navbarNav"
                aria-expanded="false"
                aria-label="Toggle navigation">

            <span class="navbar-toggler-icon"></span>

        </button>

        <div class="collapse navbar-collapse"
             id="navbarNav">

            <ul class="navbar-nav ms-auto">

                <li class="nav-item">
                    <a class="nav-link" href="/products/">
                        Accueil
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/products/">
                        Produits
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="#">
                        Panier
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/admin/">
                        Admin
                    </a>
                </li>

            </ul>

        </div>

    </div>
</nav>

{% block hero %}
{% endblock %}

<main class="container">

    {% block content %}
    {% endblock %}

</main>

<footer class="footer">
    <p class="mb-0">
        © 2026 E-commerce Django — Projet Atelier 4
    </p>
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
</script>

</body>

</html>
